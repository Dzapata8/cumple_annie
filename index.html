<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ☀️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --pink:    #e8539a;
    --pink-lt: #f9a8d4;
    --bg1:     #fff0f8;
    --bg2:     #fce4f0;
    --text:    #c93c7a;
  }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg1);
    overflow-x: hidden;
  }

  /* ─── PARTICLES ─── */
  #particles {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }
  .pt {
    position: absolute; border-radius: 50%;
    animation: pt-rise linear infinite;
  }
  @keyframes pt-rise {
    0%   { transform: translateY(105vh) scale(0); opacity:0; }
    10%  { opacity:.45; }
    90%  { opacity:.2; }
    100% { transform: translateY(-5vh)  scale(1); opacity:0; }
  }

  /* ─── SCREEN 1 ─── */
  #screen1 {
    position: relative;
    height: 100vh; width: 100%;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 55% 45%, #ffe4f3 0%, var(--bg1) 70%);
    z-index: 2;
    overflow: hidden;
    transition: opacity .8s ease, transform .8s ease;
  }
  #screen1.hide { opacity:0; transform:scale(1.04); pointer-events:none; position: absolute; top: 0; left: 0; width: 100%; }

  /* hint top */
  .hint {
    position: absolute; top: 38px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 3.5px; text-transform: uppercase;
    color: var(--pink); opacity:0;
    animation: fade-in 1s ease .5s forwards;
    white-space: nowrap;
  }

  /* the image — full width constrained */
  .s1-img {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    opacity:0; animation: rise 1s ease .8s forwards;
  }
  .s1-img img {
    width: min(360px, 88vw);
    display: block;
    filter: drop-shadow(0 10px 28px rgba(220,80,140,.22));
    animation: bob 3.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }

  /* button OVERLAID in center of image — between the two characters */
  .btn-over {
    position: absolute;
    /* horizontally centered on the image gap between the two chibis */
    left: 50%; top: 52%;
    transform: translate(-50%, -50%);
    opacity:0; animation: fade-in 1s ease 1.6s forwards;
  }
  .click-btn {
    background: linear-gradient(135deg, #f472a8, #d93f88);
    color: #fff;
    border: none;
    padding: 13px 30px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    letter-spacing: .8px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(217,63,136,.45);
    transition: transform .2s, box-shadow .2s;
    white-space: nowrap;
  }
  .click-btn:hover  { transform: translateY(-3px) scale(1.05); box-shadow: 0 9px 28px rgba(217,63,136,.55); }
  .click-btn:active { transform: scale(.96); }

  /* ─── SCREEN 2 ─── */
  #screen2 {
    position: relative;
    height: 100vh; width: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    background: radial-gradient(ellipse at 50% 35%, #fff0f8 0%, var(--bg2) 60%, #f5d5ea 100%);
    overflow: hidden;
  }

  .confetti-layer {
    position: absolute; inset: 0;
    pointer-events: none; overflow: hidden;
  }

  .bday-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(26px, 5.5vw, 50px);
    color: var(--pink);
    text-align: center;
    line-height: 1.2;
    text-shadow: 0 2px 14px rgba(220,70,130,.18);
    opacity:0; transform: translateY(-18px);
    transition: opacity .8s .3s, transform .8s .3s;
    padding: 0 20px;
  }
  .sol-sub {
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 300; letter-spacing: 4px;
    text-transform: uppercase; color: #e06899;
    opacity:0; transition: opacity .8s .55s;
    margin-top: 3px;
  }
  .s2-img {
    opacity:0; transform: scale(.85);
    transition: opacity .9s .75s, transform .9s cubic-bezier(.34,1.56,.64,1) .75s;
    margin-top: 6px;
  }
  .s2-img img {
    width: min(220px, 70vw);
    display: block;
    filter: drop-shadow(0 8px 22px rgba(200,70,130,.28));
  }
  .hearts {
    display: flex; gap: 11px; margin-top: 8px;
    opacity:0; transition: opacity .7s 1.3s;
  }
  .hearts span { font-size: 20px; animation: hb 1.4s ease-in-out infinite; }
  .hearts span:nth-child(2) { animation-delay:.2s; }
  .hearts span:nth-child(3) { animation-delay:.4s; }
  @keyframes hb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.35)} }

  .sub-msg {
    font-size: 12px; color: #c87099;
    letter-spacing: 1px; text-align: center;
    padding: 0 28px; max-width: 280px; line-height: 1.7;
    opacity:0; transition: opacity .8s 1.6s;
  }

  /* active state triggers */
  #screen2.show .bday-title  { opacity:1; transform:translateY(0); }
  #screen2.show .sol-sub     { opacity:1; }
  #screen2.show .s2-img      { opacity:1; transform:scale(1); }
  #screen2.show .hearts      { opacity:1; }
  #screen2.show .sub-msg     { opacity:1; }

  /* down arrow */
  .arrow-wrap {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer;
    opacity:0; transition: opacity .8s 2s;
  }
  #screen2.show .arrow-wrap { opacity:1; }
  .arrow-label {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--pink); font-weight: 700;
  }
  .arrow-icon {
    font-size: 22px; color: var(--pink);
    animation: bounce-down 1.5s ease-in-out infinite;
  }
  @keyframes bounce-down {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(7px); }
  }
  .arrow-wrap:hover .arrow-icon { color: #c93070; }

  /* ─── VIDEO SECTION ─── */
  #video-section {
    min-height: 100vh; width: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    background: radial-gradient(ellipse at 40% 60%, #fce4f2 0%, #fff0f8 60%);
    padding: 60px 24px;
  }

  .vid-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(22px, 4.5vw, 38px);
    color: var(--pink);
    text-align: center;
    text-shadow: 0 2px 12px rgba(220,70,130,.15);
  }
  .vid-sub {
    font-size: 12px; letter-spacing: 2.5px;
    text-transform: uppercase; color: #d070a0;
    text-align: center;
  }

  .video-wrap {
    width: min(620px, 92vw);
    aspect-ratio: 16/9;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(200,60,120,.25), 0 2px 12px rgba(0,0,0,.08);
    border: 3px solid rgba(244, 114, 168, .35);
    background: #1a0a10;
    position: relative;
  }
  .video-wrap iframe,
  .video-wrap video {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  /* placeholder when no video yet */
  .vid-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: rgba(255,255,255,.4);
    font-size: 13px; letter-spacing: 1px;
  }
  .vid-placeholder .play-icon { font-size: 44px; opacity:.5; }

  .vid-hearts { font-size: 18px; letter-spacing: 6px; }

  /* ─── HELPERS ─── */
  @keyframes fade-in { to { opacity:1; } }
  @keyframes rise    { to { opacity:1; transform:translateY(0); } }

  /* corner decor */
  .corner { position:fixed; font-size:26px; opacity:.18; pointer-events:none; z-index:0; }
  .corner.tl { top:16px; left:16px; }
  .corner.tr { top:16px; right:16px; }
  .corner.bl { bottom:16px; left:16px; }
  .corner.br { bottom:16px; right:16px; }
</style>
</head>
<body>

<div id="particles"></div>
<div class="corner tl">✿</div>
<div class="corner tr">✿</div>
<div class="corner bl">✿</div>
<div class="corner br">✿</div>

<!-- ═══ SCREEN 1 ═══ -->
<section id="screen1">
  <p class="hint">✦ tengo algo para ti ✦</p>
  <div class="s1-img">
   <img src="image_1.png" alt="Imagen_1">
   <div class="btn-over">
      <button class="click-btn" onclick="reveal()">Dale click aquí ☀️</button>
    </div>
  </div>
</section>

<!-- ═══ SCREEN 2 ═══ -->
<section id="screen2">
  <div class="confetti-layer" id="confettiLayer"></div>
  <h1 class="bday-title">Feliz Cumpleaños</h1>
  <p class="sol-sub">Solecito ☀️</p>
  <div class="s2-img">
    <img src="image_2.png" alt="Imagen_2">
  </div>
  <div class="hearts">
    <span>💕</span><span>🌸</span><span>💕</span>
  </div>
  <p class="sub-msg">Que este día sea tan especial como tú eres para mí 🤍</p>

  <!-- down arrow -->
  <div class="arrow-wrap" onclick="scrollToVideo()">
    <span class="arrow-label">para ti</span>
    <span class="arrow-icon">↓</span>
  </div>
</section>

<!-- ═══ VIDEO SECTION ═══ -->
<section id="video-section">
  <p class="vid-sub">✦ un mensajito especial ✦</p>
  <h2 class="vid-title">Solo para ti, Solecito</h2>
  <div class="video-wrap" id="videoWrap">
    <!-- 
      ─────────────────────────────────────────────
      DIEGO: reemplaza el src de abajo con tu link
      de YouTube. Ejemplo:
      src="https://www.youtube.com/embed/TU_VIDEO_ID"
      ─────────────────────────────────────────────
    -->
     <iframe src="https://www.youtube.com/watch?v=cEgII5ZXfvs" allowfullscreen></iframe>
  </div>
  <p class="vid-hearts">💕 🌸 💕</p>
</section>

<script>
  /* ── Particles ── */
  const pColors = ['#f9a8d4','#fda4af','#fbcfe8','#fde68a','#c4b5fd','#f0abfc'];
  const pc = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const d = document.createElement('div');
    d.className = 'pt';
    const s = 4 + Math.random() * 9;
    d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;
      background:${pColors[Math.floor(Math.random()*pColors.length)]};
      animation-duration:${6+Math.random()*9}s;
      animation-delay:${Math.random()*7}s;`;
    pc.appendChild(d);
  }

  /* ── Reveal screen 2 ── */
  function reveal() {
    document.getElementById('screen1').classList.add('hide');
    setTimeout(() => {
      document.getElementById('screen2').classList.add('show');
      launchConfetti();
    }, 450);
  }

  /* ── Scroll to video ── */
  function scrollToVideo() {
    document.getElementById('video-section').scrollIntoView({ behavior: 'smooth' });
  }

  /* ── Confetti ── */
  function launchConfetti() {
    const layer  = document.getElementById('confettiLayer');
    const shapes = ['★','♥','✿','◆','✦','•'];
    const cols   = ['#f472b6','#fb923c','#facc15','#a78bfa','#34d399','#f9a8d4'];
    if (!document.getElementById('conf-kf')) {
      const st = document.createElement('style');
      st.id = 'conf-kf';
      st.textContent = `@keyframes cf {
        0%   { transform: translateY(-20px) rotate(0deg) scale(0); opacity:1; }
        20%  { opacity:1; }
        100% { transform: translateY(105vh) rotate(700deg) scale(1); opacity:0; }
      }`;
      document.head.appendChild(st);
    }
    for (let i = 0; i < 65; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.style.cssText = `
          position:absolute; top:-10px;
          left:${Math.random()*100}%;
          font-size:${10+Math.random()*18}px;
          color:${cols[Math.floor(Math.random()*cols.length)]};
          animation: cf ${1.6+Math.random()*2.2}s ease-in forwards;
          pointer-events:none;
        `;
        c.textContent = shapes[Math.floor(Math.random()*shapes.length)];
        layer.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 38);
    }
  }
</script>
</body>
</html>
